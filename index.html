    yt:{type:"script",title:`${t.title} — Full Explanation`,hook:`"${t.angle} Here's what the headlines got wrong."`,outline:["Introduction","The key facts","What this means for your situation","Practical next steps","Questions answered"],script_sample:`[INTRO — On camera]\nToday we're breaking down ${t.title}.\n\nI'm going to give you the facts, explain what they actually mean for your situation, and tell you exactly what to do next.\n\nLet's get into it.`},
  }[ch] || null;
}

function getContent(topicId, ch) {
  if (GEN[topicId]?.[ch]) return GEN[topicId][ch];
  const topic = TOPICS.find(t => t.id === topicId);
  return topic ? genFallback(topic, ch) : null;
}

    navigator.clipboard.writeText(text).catch(()=>{});
    setCopied(true);
    setTimeout(()=>setCopied(false),2200);
  },[]);

  const activeFeedData = liveFeed.length > 0 ? liveFeed : FEED;
  const filteredFeed = activeFeedData.filter(f=>f.cat===feedFilter);
  const selectedTopic = TOPICS.find(t=>t.id===selectedTopicId);
  const scriptContent = getContent(scriptTopic, scriptFormat);
  const templateTopic = TOPICS.find(t=>t.id===tmplTopic);

  return (
    <div style={{minHeight:"100vh",background:C.wh,fontFamily:C.db,color:C.n8}}>
      {/* HEADER */}
      <div style={{background:C.b9,padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",height:52,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px #0004"}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <LogoMark dark size={18}/>
          <div style={{width:1,height:20,background:`${C.wh}30`}}/>
          <span style={{color:C.b2,fontSize:13,fontWeight:500,letterSpacing:.3}}>Content Creator</span>
          <span style={{background:`${C.g6}22`,border:`1px solid ${C.g6}44`,color:C.g4,borderRadius:999,padding:"2px 10px",fontSize:10,fontWeight:700,letterSpacing:.5}}>BETA</span>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          {lastUpdated && <span style={{color:C.b4,fontSize:11}}>Updated {lastUpdated}</span>}
          {!lastUpdated && !feedLoading && <span style={{color:C.n5,fontSize:11}}>Seed data — deploy to enable live updates</span>}
          <div style={{display:"flex",gap:5,alignItems:"center"}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:liveFeed.length>0?"#4ade80":"#facc15",animation:"bpPulse 2s infinite"}}/>
            <span style={{color:C.b4,fontSize:11}}>{liveFeed.length>0?`${liveFeed.length} live items`:`${FEED.length} seed items`}</span>
          </div>
        </div>
      </div>

      {/* NAV TABS */}
      <div style={{background:C.bwh,borderBottom:`1px solid ${C.n4}`,padding:"0 24px",display:"flex",gap:0,overflowX:"auto"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",borderBottom:`3px solid ${tab===t.id?C.b8:"transparent"}`,padding:"14px 18px",fontSize:13,fontWeight:tab===t.id?600:400,color:tab===t.id?C.b8:C.n6,cursor:"pointer",whiteSpace:"nowrap",transition:"all .15s",display:"flex",gap:6,alignItems:"center"}}>
            <span style={{fontSize:14}}>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>

      {/* CONTENT AREA */}
      <div style={{maxWidth:1200,margin:"0 auto",padding:"24px 24px 48px"}}>

        {/* ── FEED TAB ──────────────────────────────────────────────── */}
        {tab==="feed" && (
          <div>
            <div style={{marginBottom:20}}>
              <h1 style={{fontFamily:C.dp,fontSize:28,margin:"0 0 6px",color:C.b9}}>Intelligence Feed</h1>
              <p style={{fontSize:14,color:C.n6,margin:0}}>Monitored sources: IRCC, competitor brands, social UGC, and industry news. Updated weekly.</p>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
              {CATS.map(c=>(
                <button key={c.id} onClick={()=>setFeedFilter(c.id)} style={{background:feedFilter===c.id?c.color:C.bwh,color:feedFilter===c.id?C.wh:C.n7,border:`1px solid ${feedFilter===c.id?c.color:C.n4}`,borderRadius:999,padding:"7px 16px",fontSize:13,fontWeight:feedFilter===c.id?600:400,cursor:"pointer",transition:"all .15s"}}>
                  {c.label} <span style={{opacity:.7,fontSize:12}}>({FEED.filter(f=>f.cat===c.id).length})</span>
                </button>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:16}}>
              {filteredFeed.map(item=>(
                <FeedCard key={item.id} item={item} added={addedTopics.has(item.id)} onAddTopic={id=>{setAddedTopics(s=>{const n=new Set(s);n.add(id);return n;});}}/>
              ))}
            </div>
          </div>
        )}

        {/* ── TOPICS TAB ────────────────────────────────────────────── */}
        {tab==="topics" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
              <div>
                <h1 style={{fontFamily:C.dp,fontSize:28,margin:"0 0 6px",color:C.b9}}>Topic Studio</h1>
                <p style={{fontSize:14,color:C.n6,margin:0}}>Auto-generated content topics from your intelligence feed, scored by channel fit.</p>
              </div>
              <button onClick={()=>setTab("studio")} style={{background:C.b8,color:C.wh,border:"none",borderRadius:999,padding:"10px 20px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                Open Content Studio →
              </button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(360px,1fr))",gap:16}}>
              {TOPICS.map(t=>(
                <TopicCard key={t.id} topic={t} selected={selectedTopicId===t.id} onSelect={id=>{setSelectedTopicId(id);}}/>
              ))}
            </div>
            {selectedTopicId && (
              <div style={{marginTop:24,background:C.b1,borderRadius:16,padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontWeight:600,color:C.b8,marginBottom:2}}>"{TOPICS.find(t=>t.id===selectedTopicId)?.title}"</div>
                  <div style={{fontSize:13,color:C.b6}}>Selected — open Content Studio to generate copy for any channel.</div>
                </div>
                <button onClick={()=>setTab("studio")} style={{background:C.b8,color:C.wh,border:"none",borderRadius:999,padding:"10px 20px",fontSize:13,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>
                  Generate Content →
                </button>
              </div>
            )}
          </div>
        )}

        {/* ── CONTENT STUDIO TAB ───────────────────────────────────── */}
        {tab==="studio" && (
          <div>
            <div style={{marginBottom:20}}>
              <h1 style={{fontFamily:C.dp,fontSize:28,margin:"0 0 6px",color:C.b9}}>Content Studio</h1>
              <p style={{fontSize:14,color:C.n6,margin:0}}>Select a topic and channel to generate ready-to-publish content.</p>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"280px 1fr",gap:16,alignItems:"start"}}>
              {/* Left panel */}
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div style={{background:C.bwh,border:`1px solid ${C.n4}`,borderRadius:12,overflow:"hidden"}}>
                  <div style={{background:C.n2,padding:"10px 14px",fontSize:11,fontWeight:700,letterSpacing:.5,color:C.n6}}>TOPIC</div>
                  {TOPICS.map(t=>(
                    <div key={t.id} onClick={()=>setSelectedTopicId(t.id)} style={{padding:"10px 14px",cursor:"pointer",background:selectedTopicId===t.id?C.b1:"transparent",borderBottom:`1px solid ${C.n4}`,transition:"background .12s"}}>
                      <div style={{fontSize:12,fontWeight:selectedTopicId===t.id?600:400,color:selectedTopicId===t.id?C.b8:C.n7,lineHeight:1.4}}>{t.title.substring(0,52)}{t.title.length>52?"…":""}</div>
                      <div style={{fontSize:10,color:C.n5,marginTop:2}}>{t.cat} · {t.urgency}</div>
                    </div>
                  ))}
                </div>
                <div style={{background:C.bwh,border:`1px solid ${C.n4}`,borderRadius:12,overflow:"hidden"}}>
                  <div style={{background:C.n2,padding:"10px 14px",fontSize:11,fontWeight:700,letterSpacing:.5,color:C.n6}}>CHANNEL</div>
                  {CHANNELS.map(c=>(
                    <div key={c.id} onClick={()=>setChannel(c.id)} style={{padding:"10px 14px",cursor:"pointer",background:channel===c.id?C.b1:"transparent",borderBottom:`1px solid ${C.n4}`,display:"flex",alignItems:"center",gap:8,transition:"background .12s"}}>
                      <span style={{fontSize:16}}>{c.icon}</span>
                      <span style={{fontSize:13,fontWeight:channel===c.id?600:400,color:channel===c.id?C.b8:C.n7}}>{c.label}</span>
                      {selectedTopicId && (
                        <div style={{marginLeft:"auto",display:"flex",gap:2}}>
                          {[1,2,3,4,5].map(i=><div key={i} style={{width:5,height:5,borderRadius:1,background:i<=(TOPICS.find(t=>t.id===selectedTopicId)?.fit?.[c.id]||0)?C.b8:C.n4}}/>)}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
              {/* Right panel */}
              <div style={{border:`1px solid ${C.n4}`,borderRadius:12,overflow:"hidden",minHeight:520}}>
                <ContentDisplay topicId={selectedTopicId} channel={channel} onCopy={handleCopy} copied={copied}/>
              </div>
            </div>
          </div>
        )}

        {/* ── POST TEMPLATES TAB ───────────────────────────────────── */}
        {tab==="templates" && (
          <div>
            <div style={{marginBottom:20}}>
              <h1 style={{fontFamily:C.dp,fontSize:28,margin:"0 0 6px",color:C.b9}}>Post Templates</h1>
              <p style={{fontSize:14,color:C.n6,margin:0}}>Branded visual templates for every channel. Static, story, and animated formats.</p>
            </div>
            <div style={{display:"flex",gap:16,marginBottom:24,flexWrap:"wrap"}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:.5,color:C.n6,marginBottom:8}}>FORMAT</div>
                <div style={{display:"flex",gap:8}}>
                  {[{id:"square",label:"Instagram Square"},{id:"story",label:"Story / Reels"},{id:"tiktok",label:"TikTok"},{id:"linkedin",label:"LinkedIn"},{id:"animated",label:"Animated ✨"}].map(f=>(
                    <button key={f.id} onClick={()=>setTmplFormat(f.id)} style={{background:tmplFormat===f.id?C.b8:C.bwh,color:tmplFormat===f.id?C.wh:C.n7,border:`1px solid ${tmplFormat===f.id?C.b8:C.n4}`,borderRadius:999,padding:"6px 14px",fontSize:12,fontWeight:tmplFormat===f.id?600:400,cursor:"pointer",transition:"all .15s"}}>{f.label}</button>
                  ))}
                </div>
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:.5,color:C.n6,marginBottom:8}}>TOPIC</div>
                <select value={tmplTopic} onChange={e=>setTmplTopic(e.target.value)} style={{border:`1px solid ${C.n4}`,borderRadius:8,padding:"7px 12px",fontSize:13,color:C.n7,background:C.bwh,outline:"none",maxWidth:300}}>
                  {TOPICS.map(t=><option key={t.id} value={t.id}>{t.title.substring(0,50)}…</option>)}
                </select>
              </div>
            </div>
            <div style={{display:"flex",gap:40,alignItems:"flex-start",flexWrap:"wrap"}}>
              <div>
                {tmplFormat==="square" && <InstagramSquare topic={templateTopic}/>}
                {tmplFormat==="story" && <StoryTemplate topic={templateTopic}/>}
                {tmplFormat==="tiktok" && <TikTokTemplate topic={templateTopic}/>}
                {tmplFormat==="linkedin" && <LinkedInTemplate topic={templateTopic}/>}
                {tmplFormat==="animated" && <AnimatedTemplate topic={templateTopic}/>}
              </div>
              <div style={{flex:1,minWidth:260}}>
                <div style={{background:C.bwh,border:`1px solid ${C.n4}`,borderRadius:12,padding:20}}>
                  <div style={{fontWeight:700,fontSize:15,color:C.n8,marginBottom:12}}>{tmplFormat==="animated"?"Animated Post":"Static Template"} — Usage Guide</div>
                  {tmplFormat==="square" && <TemplateGuide format="Instagram Square (1:1)" dims="1080×1080px" tools="Figma, Canva" notes={["Export at 2× (1080px) for Instagram feed","Blue/dark bg with gold accent = highest stop rate","Pair with the carousel caption from Content Studio","Post Tue–Thu 7–9am or 12–1pm EST"]}/>}
                  {tmplFormat==="story" && <TemplateGuide format="Instagram Story / Reels Cover (9:16)" dims="1080×1920px" tools="Figma, Canva, CapCut" notes={["Export at 2× for crisp mobile rendering","Use as Reels cover image or Story background","Add animated text overlay in CapCut or InShot","Student-facing: warm gold tones signal trust"]}/>}
                  {tmplFormat==="tiktok" && <TemplateGuide format="TikTok Thumbnail (9:16)" dims="1080×1920px" tools="CapCut, Canva, Figma" notes={["Bold text hook visible without unmuting","Progress bar at bottom signals series content","Dark gradient = strong contrast on all devices","Export as PNG for static, or MP4 for animated cover"]}/>}
                  {tmplFormat==="linkedin" && <TemplateGuide format="LinkedIn Post Image (1.91:1)" dims="1200×627px" tools="Figma, Canva" notes={["White/light bg performs better on LinkedIn feed","Include the metric or key stat in the graphic","Tag 2–3 relevant companies or people for reach","Post midweek 8–10am for professional audience"]}/>}
                  {tmplFormat==="animated" && <TemplateGuide format="Animated Social Post (CSS/MP4)" dims="1080×1080px or 1080×1920px" tools="After Effects, CapCut, Lottie" notes={["Export as MP4 for Instagram, TikTok, LinkedIn","Stagger text animation: 0.3s delay per element","Scanline effect reinforces tech-forward brand theme","Keep loop under 4s for auto-play engagement","Use as standalone or as video post cover frame"]}/>}
                </div>
                <div style={{marginTop:12,background:C.g1,border:`1px solid ${C.g2}`,borderRadius:12,padding:"12px 16px"}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.g8,marginBottom:6}}>AI VIDEO TOOLS — RECOMMENDED PIPELINE</div>
                  {[{tool:"HeyGen",use:"Talking-head avatar for educational scripts. Use the PGWP or cap topic scripts."},{tool:"Runway Gen-4",use:"B-roll generation from text prompts. Match shot list from Video Scripts tab."},{tool:"Sora",use:"Cinematic background footage — Canadian campus, immigration office, city life."},{tool:"ElevenLabs",use:"Voiceover for scripts. Set voice to warm, confident tone matching brand."}].map(({tool,use})=>(
                    <div key={tool} style={{display:"flex",gap:8,marginBottom:6}}>
                      <span style={{fontWeight:700,fontSize:12,color:C.g8,minWidth:90}}>{tool}</span>
                      <span style={{fontSize:12,color:C.g9,lineHeight:1.4}}>{use}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ── VIDEO SCRIPTS TAB ────────────────────────────────────── */}
        {tab==="scripts" && (
          <div>
            <div style={{marginBottom:20}}>
              <h1 style={{fontFamily:C.dp,fontSize:28,margin:"0 0 6px",color:C.b9}}>Video Scripts</h1>
              <p style={{fontSize:14,color:C.n6,margin:0}}>Structured scripts for TikTok, Reels, YouTube, and AI video platforms.</p>
            </div>
            <div style={{display:"flex",gap:16,marginBottom:20,flexWrap:"wrap"}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:.5,color:C.n6,marginBottom:8}}>TOPIC</div>
                <select value={scriptTopic} onChange={e=>setScriptTopic(e.target.value)} style={{border:`1px solid ${C.n4}`,borderRadius:8,padding:"7px 12px",fontSize:13,color:C.n7,background:C.bwh,outline:"none",maxWidth:360}}>
                  {TOPICS.map(t=><option key={t.id} value={t.id}>{t.title.substring(0,55)}…</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:.5,color:C.n6,marginBottom:8}}>FORMAT</div>
                <div style={{display:"flex",gap:8}}>
                  {[{id:"tk",label:"TikTok / Reels"},{id:"yt",label:"YouTube Long-form"}].map(f=>(
                    <button key={f.id} onClick={()=>setScriptFormat(f.id)} style={{background:scriptFormat===f.id?C.b8:C.bwh,color:scriptFormat===f.id?C.wh:C.n7,border:`1px solid ${scriptFormat===f.id?C.b8:C.n4}`,borderRadius:999,padding:"7px 16px",fontSize:13,fontWeight:scriptFormat===f.id?600:400,cursor:"pointer",transition:"all .15s"}}>{f.label}</button>
                  ))}
                </div>
              </div>
            </div>
            {scriptContent ? (
              <div style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:16,alignItems:"start"}}>
                <div style={{background:C.bwh,border:`1px solid ${C.n4}`,borderRadius:12,overflow:"hidden"}}>
                  <div style={{background:C.b9,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{color:C.wh,fontWeight:600,fontSize:14}}>{scriptContent.title||`${CHANNELS.find(c=>c.id===scriptFormat)?.label} Script`}</div>
                      <div style={{color:C.b4,fontSize:12,marginTop:2}}>{TOPICS.find(t=>t.id===scriptTopic)?.cat} · {scriptContent.duration||"Long-form"}</div>
                    </div>
                    <button onClick={()=>{
                      let t=`TITLE: ${scriptContent.title||""}\n\nHOOK:\n${scriptContent.hook}\n\n`;
                      if(scriptContent.type==="script"){t+=`BODY:\n${scriptContent.body}\n\nCTA:\n${scriptContent.cta}\n\nB-ROLL:\n${scriptContent.broll?.join("\n")}`;}
                      else if(scriptContent.type==="script"&&scriptContent.outline){t+=`OUTLINE:\n${scriptContent.outline.join("\n")}\n\nSCRIPT SAMPLE:\n${scriptContent.script_sample}`;}
                      if(scriptContent.outline){t+=`\n\nOUTLINE:\n${scriptContent.outline.join("\n")}`;}
                      if(scriptContent.script_sample){t+=`\n\nSCRIPT SAMPLE:\n${scriptContent.script_sample}`;}
                      handleCopy(t);
                    }} style={{background:copied?C.gr8:C.g6,color:C.wh,border:"none",borderRadius:999,padding:"7px 18px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                      {copied?"✓ Copied!":"Copy Script"}
                    </button>
                  </div>
                  <div style={{padding:20,display:"flex",flexDirection:"column",gap:16}}>
                    <Section label="HOOK / OPENING LINE" color={C.r1} textColor="#9B1C1C">
                      <span style={{fontSize:15,fontFamily:C.dp,color:C.n8,lineHeight:1.4}}>{scriptContent.hook}</span>
                    </Section>
                    {scriptContent.body && <Section label={`BODY (${scriptContent.duration||""})`} color={C.b1} textColor={C.b8}><pre style={{whiteSpace:"pre-wrap",fontFamily:C.db,fontSize:13.5,lineHeight:1.7,margin:0,color:C.n7}}>{scriptContent.body}</pre></Section>}
                    {scriptContent.cta && <Section label="CALL TO ACTION" color={C.g1} textColor={C.g8}>{scriptContent.cta}</Section>}
                    {scriptContent.broll && (
                      <Section label="B-ROLL / SHOT LIST" color={C.n2} textColor={C.n6}>
                        {scriptContent.broll.map((b,i)=>(
                          <div key={i} style={{display:"flex",gap:10,padding:"5px 0",borderBottom:i<scriptContent.broll.length-1?`1px solid ${C.n4}`:"none"}}>
                            <span style={{color:C.b6,fontWeight:600,fontSize:13,minWidth:20}}>{i+1}.</span>
                            <span style={{fontSize:13,color:C.n7}}>{b}</span>
                          </div>
                        ))}
                      </Section>
                    )}
                    {scriptContent.outline && (
                      <Section label="VIDEO OUTLINE / CHAPTERS" color={C.b1} textColor={C.b8}>
                        {scriptContent.outline.map((o,i)=>(
                          <div key={i} style={{display:"flex",gap:10,padding:"6px 0",borderBottom:i<scriptContent.outline.length-1?`1px solid ${C.n4}`:"none"}}>
                            <span style={{color:C.b6,fontWeight:700,fontSize:12,minWidth:20}}>{i+1}.</span>
                            <span style={{fontSize:13,color:C.n7,lineHeight:1.5}}>{o}</span>
                          </div>
                        ))}
                      </Section>
                    )}
                    {scriptContent.script_sample && (
                      <Section label="SCRIPT SAMPLE" color={C.g1} textColor={C.g8}>
                        <pre style={{whiteSpace:"pre-wrap",fontFamily:C.db,fontSize:13,lineHeight:1.7,margin:0,color:C.n7}}>{scriptContent.script_sample}</pre>
                      </Section>
                    )}
                  </div>
                </div>
                {/* Right: AI tools sidebar */}
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <div style={{background:C.bwh,border:`1px solid ${C.n4}`,borderRadius:12,padding:16}}>
                    <div style={{fontWeight:700,fontSize:13,color:C.n8,marginBottom:12}}>AI VIDEO PRODUCTION</div>
                    {[
                      {tool:"HeyGen",desc:"Paste this script to generate an AI avatar video. Set style to 'casual professional.' Recommended for talking-head formats.",color:C.b1,tc:C.b8},
                      {tool:"Runway Gen-4",desc:"Generate b-roll footage using the shot list above. Prompt each shot description directly.",color:C.g1,tc:C.g8},
                      {tool:"ElevenLabs",desc:"Generate voiceover from this script. Use a warm, mid-range voice. Speed: 0.95×.",color:C.r1,tc:C.r8},
                      {tool:"CapCut",desc:"Assemble HeyGen avatar + Runway b-roll + ElevenLabs VO. Add captions with auto-transcribe.",color:C.n2,tc:C.n7},
                    ].map(({tool,desc,color,tc})=>(
                      <div key={tool} style={{background:color,borderRadius:8,padding:"10px 12px",marginBottom:8}}>
                        <div style={{fontSize:11,fontWeight:700,color:tc,marginBottom:4,letterSpacing:.3}}>{tool}</div>
                        <div style={{fontSize:12,color:C.n7,lineHeight:1.45}}>{desc}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{background:C.b9,borderRadius:12,padding:16}}>
                    <div style={{fontWeight:700,fontSize:12,color:C.g4,marginBottom:10,letterSpacing:.5}}>BRAND VOICE REMINDER</div>
                    {["Plain, direct, warm — not corporate","Qualify legal claims: 'may be eligible,' not 'is eligible'","Specific over sweeping — cite numbers","Speak to what the reader gains, not what the tech does"].map((v,i)=>(
                      <div key={i} style={{fontSize:12,color:C.b2,lineHeight:1.5,padding:"5px 0",borderBottom:i<3?`1px solid ${C.b8}`:"none"}}>✓ {v}</div>
                    ))}
                  </div>
                </div>
              </div>
            ) : (
              <div style={{padding:40,textAlign:"center",color:C.n5}}>Select a topic to generate a script.</div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── TEMPLATE GUIDE HELPER ────────────────────────────────────────────────────
function TemplateGuide({format,dims,tools,notes}) {
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        <div><div style={{fontSize:10,color:"#9E9994",fontWeight:700,letterSpacing:.5,marginBottom:2}}>FORMAT</div><div style={{fontSize:12,color:"#504D49",fontWeight:500}}>{format}</div></div>
        <div><div style={{fontSize:10,color:"#9E9994",fontWeight:700,letterSpacing:.5,marginBottom:2}}>DIMENSIONS</div><div style={{fontSize:12,color:"#504D49",fontWeight:500}}>{dims}</div></div>
        <div><div style={{fontSize:10,color:"#9E9994",fontWeight:700,letterSpacing:.5,marginBottom:2}}>TOOLS</div><div style={{fontSize:12,color:"#504D49",fontWeight:500}}>{tools}</div></div>
      </div>
      <div style={{fontSize:10,color:"#9E9994",fontWeight:700,letterSpacing:.5,marginBottom:6}}>PRODUCTION NOTES</div>
      {notes.map((n,i)=><div key={i} style={{fontSize:12,color:"#504D49",lineHeight:1.5,padding:"4px 0",borderBottom:i<notes.length-1?"1px solid #F0EEEA":"none"}}>→ {n}</div>)}
    </div>
  );
}



    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(BorderPassContentCreator));
  </script>
